<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Sign Star Hub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Outfit', sans-serif;
            color: #5C4A78;
        }
        
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background-color: #F3EFFF;
            height: 80px;
            border-bottom: 1px solid #E5DCFF;
        }

        /* The cool wrapper div box you requested around the title */
        .title-container {
            display: flex;
            align-items: center;
            padding: 4px 0;
        }

        .title {
            font-size: 30px;
            color: #1A0933;
            font-family: 'Libre Baskerville', serif;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        nav { display: flex; align-items: center; }
        nav a { 
            margin-left: 25px; 
            color: #786899; 
            font-size: 16px; 
            text-decoration: none;
            font-weight: 500;
            text-transform: lowercase;
            transition: color 0.2s ease;
        }
        nav a:hover { color: #1A0933; }
        
        .content {
            flex: 1;
            padding: 40px 0;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 0 40px;
            max-width: 1300px;
            margin: 0 auto;
        }

        .project-box {
            background-color: #F3EFFF; 
            border: 2px solid #E5DCFF; 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(157, 0, 219, 0.08); 
            display: flex;
            flex-direction: column;
            gap: 12px; 
            text-decoration: none;
            transition: all 0.2s ease;
            width:400px;
        }

        .project-box:hover {
            transform: translateY(-4px); 
            box-shadow: 0 8px 25px rgba(157, 0, 219, 0.15);
            border-color: #C3B4FF;
        }

        .project-box img {
            width: 100%;
            height: 160px;
            object-fit: cover;  
            display: block;
            background: #E5DCFF;
            border-radius: 8px;
        }

        .project-box .img-placeholder {
            width: 100%;
            height: 160px;
            background: #E5DCFF; 
            border: 1px dashed #C3B4FF; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9d00db; 
            font-size: 14px;
            border-radius: 8px;
        }

        .project-box h2 {
            font-family: 'Libre Baskerville', serif;
            font-size: 22px;
            color: #1A0933;
            margin: 4px 0 0 0;
            font-weight: 700;
        }

        .project-name {
            font-size: 14px;
            color: #5C4A78;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .project-desc {
            font-size: 14px;
            color: #786899;
            line-height: 1.5;
            flex: 1;
        }

        footer {
            background-color: #F3EFFF;
            border-top: 1px solid #E5DCFF;
            padding: 40px 0;
            width: 100%;
        }

        .footer-column-1 {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .footer-column-1 .title {
            font-size: 24px;
        }

        .footer-nav { margin-top: 5px; }
        .footer-nav a { 
            color: #786899; 
            font-size: 14px; 
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }
        .footer-nav a:hover { 
            color: #1A0933; 
            text-decoration: underline;
        }
  </style>
</head>
<body>

    <header>
        <div class="title-container">
            <h1 class="title">Star Sign Project Hub</h1>
        </div>
        <nav>
            <a href="/">home</a>
            <a href="/projects.html">projects</a>
            <a href="/about-me.html">about me</a>
        </nav>    
    </header>

    <main class="content">
        <div class="project-grid">
            <a href="/Pisces.html" class="project-box">
                <h2>Project Pisces</h2>
                <img src="images/portfolio.png" alt="Portfolio site screenshot"
                onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                <div class="img-placeholder" style="display:none;">no image yet</div>
                <div class="project-name">Example Project</div>
                <div class="project-desc">
                    This is a test Project. I will replace this when I make my next project.
                </div>
            </a>
        </div>
    </main>

    <footer>
        <div class="footer-column-1">
            <h1 class="title">Star Sign Project Hub</h1>
            <div class="footer-nav">
                <a href="https://github.com/Not-JM">GITHUB</a>
            </div>
            <div class="footer-nav">
                <a href="https://www.youtube.com/@totallynotjm">YOUTUBE</a>
            </div>
            <div class="footer-nav">
                <a href="https://stardance.hackclub.com/@JM">HACKCLUB</a>
            </div>
            <div class="footer-nav">
                <a href="mailto:rius.johnmarco07@gmail.com">EMAIL</a>
            </div>
        </div>
    </footer>

</body>
</html>
